spring:
  datasource:
    url: jdbc:sqlite:brassam-test.db
    driver-class-name: org.sqlite.JDBC
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.community.dialect.SQLiteDialect
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.yaml
    contexts: test
  h2:
    console:
      enabled: false

app:
  security:
    allowed-origins:
      - http://localhost:8080
