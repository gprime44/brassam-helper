databaseChangeLog:
  - changeSet:
      id: 004-fermentation-readings
      author: gemini-cli
      changes:
        - createTable:
            tableName: fermentation_readings
            columns:
              - column:
                  name: id
                  type: integer
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: brewing_session_id
                  type: integer
                  constraints:
                    nullable: false
                    foreignKeyName: fk_reading_session
                    referencedTableName: brewing_sessions
                    referencedColumnNames: id
              - column:
                  name: timestamp
                  type: datetime
                  constraints:
                    nullable: false
              - column:
                  name: gravity
                  type: double
              - column:
                  name: temperature
                  type: double
              - column:
                  name: notes
                  type: text
