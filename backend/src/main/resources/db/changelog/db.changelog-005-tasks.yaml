databaseChangeLog:
  - changeSet:
      id: 005-brewing-tasks
      author: gemini-cli
      changes:
        - createTable:
            tableName: brewing_tasks
            columns:
              - column:
                  name: id
                  type: integer
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: brewing_session_id
                  type: integer
                  constraints:
                    nullable: false
                    foreignKeyName: fk_task_session
                    referencedTableName: brewing_sessions
                    referencedColumnNames: id
              - column:
                  name: label
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: completed
                  type: boolean
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
              - column:
                  name: category
                  type: varchar(50)
                  constraints:
                    nullable: false
              - column:
                  name: order_index
                  type: integer
                  constraints:
                    nullable: false
