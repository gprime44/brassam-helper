databaseChangeLog:
  - changeSet:
      id: create-styles-table
      author: gemini
      changes:
        - createTable:
            tableName: styles
            columns:
              - column: {name: id, type: integer, autoIncrement: true, constraints: {primaryKey: true, nullable: false}}
              - column: {name: name, type: varchar(255), constraints: {nullable: false}}
              - column: {name: category, type: varchar(255)}
              - column: {name: style_id, type: varchar(50)}
              - column: {name: og_min, type: double}
              - column: {name: og_max, type: double}
              - column: {name: fg_min, type: double}
              - column: {name: fg_max, type: double}
              - column: {name: ibu_min, type: double}
              - column: {name: ibu_max, type: double}
              - column: {name: ebc_min, type: double}
              - column: {name: ebc_max, type: double}
              - column: {name: abv_min, type: double}
              - column: {name: abv_max, type: double}
              - column: {name: notes, type: text}
              - column: {name: aroma, type: text}
              - column: {name: appearance, type: text}
              - column: {name: flavor, type: text}
              - column: {name: mouthfeel, type: text}

  - changeSet:
      id: import-styles-data
      author: gemini
      context: "prod,dev"
      changes:
        - sqlFile:
            path: db/data/styles_import.sql
            relativeToChangelogFile: false

  - changeSet:
      id: import-test-styles-data
      author: gemini
      context: "test"
      changes:
        - insert:
            tableName: styles
            columns:
              - column: {name: id, valueNumeric: 1}
              - column: {name: name, value: "Ordinary Bitter"}
              - column: {name: category, value: "British Origin Ale Styles"}
              - column: {name: og_min, valueNumeric: 1.030}
              - column: {name: og_max, valueNumeric: 1.038}
