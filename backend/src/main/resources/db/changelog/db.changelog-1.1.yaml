databaseChangeLog:
  - changeSet:
      id: 2
      author: gemini
      changes:
        - createTable:
            tableName: recipes
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: external_id
                  type: UUID
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: TEXT
              - column:
                  name: batch_volume
                  type: DOUBLE
              - column:
                  name: efficiency
                  type: DOUBLE

        - createTable:
            tableName: recipe_fermentables
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: recipe_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_rf_recipe
                    referencedTableName: recipes
                    referencedColumnNames: id
              - column:
                  name: fermentable_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: amount
                  type: DOUBLE

        - createTable:
            tableName: recipe_hops
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: recipe_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_rh_recipe
                    referencedTableName: recipes
                    referencedColumnNames: id
              - column:
                  name: hop_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: amount
                  type: DOUBLE
              - column:
                  name: phase
                  type: VARCHAR(50)
              - column:
                  name: duration
                  type: INT

        - createTable:
            tableName: recipe_yeasts
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: recipe_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_ry_recipe
                    referencedTableName: recipes
                    referencedColumnNames: id
                    unique: true
              - column:
                  name: yeast_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: amount
                  type: DOUBLE
