spring:
  datasource:
    url: jdbc:sqlite:brassam-dev.db
    driver-class-name: org.sqlite.JDBC
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.community.dialect.SQLiteDialect
  liquibase:
    enabled: true
    contexts: dev
