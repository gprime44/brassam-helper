services:
  db:
    image: mariadb:11
    container_name: brassam-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: brassam_helper
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: brassam-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mariadb://db:3306/brassam_helper
      SPRING_DATASOURCE_USERNAME: user
      SPRING_DATASOURCE_PASSWORD: password
      SPRING_LIQUIBASE_ENABLED: "true"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: brassam-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  db_data:
