server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Support pour le manifest et types MIME
    include /etc/nginx/mime.types;
    types {
        application/manifest+json webmanifest;
    }

    # Compression Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript application/manifest+json;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache pour les assets statiques
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, no-transform";
    }

    # Ne pas cacher le service worker ni le manifest
    location /sw.js {
        add_header Cache-Control "no-cache";
        proxy_no_cache 1;
        proxy_cache_bypass 1;
    }

    location /manifest.webmanifest {
        add_header Cache-Control "no-cache";
        add_header Content-Type application/manifest+json;
    }
}
